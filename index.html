
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>real game</title>
    <script type="module" src="main.js">
    </script>
        <style>
            body {
                min-height: 100dvh;
                display: grid;
                margin: 0;
                overflow: hidden;
                background: #111;
            }

            canvas {
                display: block;
                width: 100%;
                height: 100%;
            }

            .wave-overlay {
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                color: white;
                font: 700 24px/1.2 monospace;
                text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
                pointer-events: none;
                z-index: 10;
            }
        </style>
</head>
<body>    <div id="wave-indicator" class="wave-overlay">Wave 0</div>
